# ══════════════════════════════════════════════════════════════
# tmux.conf — AI Workspace
# ══════════════════════════════════════════════════════════════

# ── Mouse (essencial pro Termius no celular) ──
set -g mouse on

# ── Indexação começa em 1 ──
set -g base-index 1
setw -g pane-base-index 1

# ── Histórico grande (outputs longos do Claude/Gemini) ──
set -g history-limit 100000

# ── Renumerar windows ao fechar ──
set -g renumber-windows on

# ── Status bar ──
set -g status-style 'bg=#1a1a2e fg=#e0e0e0'
set -g status-left '#[fg=#00d4aa,bold][#S] '
set -g status-right '#[fg=#888888]%d/%m %H:%M'
set -g status-left-length 30

# ── Window ativa destaca ──
setw -g window-status-current-style 'fg=#00d4aa,bold'
setw -g window-status-current-format ' #I:#W '
setw -g window-status-format ' #I:#W '

# ── Pane borders ──
set -g pane-active-border-style 'fg=#00d4aa'
set -g pane-border-style 'fg=#333333'

# ── Atalhos intuitivos ──
# Ctrl+B r = reload config
bind r source-file ~/.tmux.conf \; display "Config recarregada!"

# Ctrl+B | = split vertical
bind | split-window -h -c "#{pane_current_path}"

# Ctrl+B - = split horizontal
bind - split-window -v -c "#{pane_current_path}"

# Ctrl+B c = nova window no mesmo diretório
bind c new-window -c "#{pane_current_path}"

# Ctrl+B X = matar sessão atual (com confirmação)
bind X confirm-before -p "Matar sessão #S? (y/n)" kill-session

# Ctrl+B Q = matar TODAS as sessões (com confirmação)
bind Q confirm-before -p "Matar TODAS as sessões? (y/n)" kill-server

# ── Responsividade (importante pra Termius mobile) ──
set -sg escape-time 0

# ── 256 cores ──
set -g default-terminal "screen-256color"
