version: "3.7"

# ══════════════════════════════════════════════════════════════
# AI Workspace — Claude Code + Gemini + Qwen + Cursor + OpenCode + Codex + Cline + Aider
# ══════════════════════════════════════════════════════════════

services:
  aiworkspace:
    image: ghcr.io/ffmenezes/ai-workspace:latest
    hostname: "{{.Service.Name}}.{{.Task.Slot}}"

    stdin_open: true
    tty: true

    ports:
      - target: 9222
        published: 9222
        protocol: tcp
        mode: host

    ports:
      - target: 2222
        published: 2222
        protocol: tcp
        mode: host

    networks:
      - network_swarm_public

    environment:
      - TERM=xterm-256color
      - LANG=C.UTF-8
      # ── Auth de CLIs (descomente e preencha o que usar) ──
      # - GEMINI_API_KEY=
      # - CURSOR_API_KEY=
      # Qwen com API key (alternativa ao OAuth):
      # - OPENAI_API_KEY=
      # - OPENAI_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
      # - OPENAI_MODEL=qwen3-coder-plus

    volumes:
      - aiworkspace_projects:/home/dev/projects
      - aiworkspace_config:/home/dev/.config
      - aiworkspace_claude:/home/dev/.claude
      - aiworkspace_gemini:/home/dev/.gemini
      - aiworkspace_qwen:/home/dev/.qwen
      - aiworkspace_cursor:/home/dev/.cursor
      - aiworkspace_opencode:/home/dev/.local/share/opencode
      - aiworkspace_codex:/home/dev/.codex
      - aiworkspace_cline:/home/dev/.cline
      - aiworkspace_aider:/home/dev/.aider
      - aiworkspace_agents:/home/dev/.agents
      - aiworkspace_ssh:/home/dev/.ssh

    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2"
          memory: 2048M
        reservations:
          cpus: "0.5"
          memory: 512M

volumes:
  aiworkspace_projects:
    external: true
    name: aiworkspace_projects
  aiworkspace_config:
    external: true
    name: aiworkspace_config
  aiworkspace_claude:
    external: true
    name: aiworkspace_claude
  aiworkspace_gemini:
    external: true
    name: aiworkspace_gemini
  aiworkspace_qwen:
    external: true
    name: aiworkspace_qwen
  aiworkspace_cursor:
    external: true
    name: aiworkspace_cursor
  aiworkspace_opencode:
    external: true
    name: aiworkspace_opencode
  aiworkspace_codex:
    external: true
    name: aiworkspace_codex
  aiworkspace_cline:
    external: true
    name: aiworkspace_cline
  aiworkspace_aider:
    external: true
    name: aiworkspace_aider
  aiworkspace_agents:
    external: true
    name: aiworkspace_agents
  aiworkspace_ssh:
    external: true
    name: aiworkspace_ssh

networks:
  network_swarm_public:
    external: true
    name: network_swarm_public
